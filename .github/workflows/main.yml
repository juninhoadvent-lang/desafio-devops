steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # IMPORTANTE: Isso baixa seus arquivos para o Runner

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .  # <--- ISSO GARANTE QUE O DOCKER VEJA O PACKAGE.JSON
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/desafio-app:latest
